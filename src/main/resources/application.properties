spring.application.name=letterboxd

# App base URL (used for password reset links)
app.base-url=${APP_URL:http://localhost:8080}

# Database - Using standard variable names for easier environment configuration
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/letterboxd_db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Sasikala@2361}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
logging.level.root=INFO
logging.level.org.thymeleaf=INFO
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=true

# TMDB configuration
tmdb.api.key=${TMDB_API_KEY:e5bf2a4240764f58be46284c50403769}
tmdb.base-url=https://api.themoviedb.org/3
tmdb.image.base-url=https://image.tmdb.org/t/p/
tmdb.image.poster.size=w500

# Logging
logging.level.org.springframework=INFO

# Messages / i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# SendGrid Email Configuration
sendgrid.api.key=${SENDGRID_API_KEY}

# Multipart Upload Size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port (Render specific)
server.port=${PORT:8080}
