spring.application.name=letterboxd

# Include local properties if they exist
spring.profiles.include=local

# Database (Render defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/letterboxd_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:Sasikala@2361}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Thymeleaf
logging.level.root=INFO
logging.level.org.thymeleaf=INFO
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html
spring.thymeleaf.mode=HTML
spring.thymeleaf.encoding=UTF-8
spring.thymeleaf.check-template-location=true

# TMDB configuration
tmdb.api.key=${TMDB_API_KEY:e5bf2a4240764f58be46284c50403769}
tmdb.base-url=https://api.themoviedb.org/3
tmdb.image.base-url=https://image.tmdb.org/t/p/
tmdb.image.poster.size=w500

# Logging
logging.level.org.springframework=INFO

# Messages / i18n
spring.messages.basename=messages
spring.messages.encoding=UTF-8

# Email / Mail Configuration (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=sasikalanalagatla@gmail.com
spring.mail.password=${SPRING_MAIL_PASSWORD:ukpb xjqi epwa odhc}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000

# Multipart Upload Size
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server Port (Render specific)
server.port=${PORT:8080}
