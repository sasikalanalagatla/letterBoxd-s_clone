<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <!-- layout fragments for consistent site look & feel -->

  <head th:fragment="baseHead(title)">
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${title}">Letterboxd Clone</title>

    <!-- Premium Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>

  </head>

  <header th:fragment="navbar(activeTab)" class="header">
    <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&display=swap" rel="stylesheet"/>
    <style>
      :root {
        --bg:       #14181c;
        --nav-bg:   #1a1a1a;
        --card:     #2c3440;
        --border:   rgba(255, 255, 255, 0.08);
        --green:    #00c030;
        --blue:     #40bcf4;
        --text:     #ccc;
        --text-dim: #9ab;
        --white:    #fff;
        --muted:    #678;
        --divider:  #222a32;
      }
      
      /* Global reset for header elements to ensure no interference */
      .header, .header * { box-sizing: border-box; }
      .header a { text-decoration: none; transition: color 0.15s; }

      /* ── HEADER ── */
      .header {
        position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
        background: #14181c;
        border-bottom: 1px solid var(--border);
        height: 56px;
        display: flex;
        justify-content: center;
        font-family: 'Titillium Web', sans-serif;
      }
      .header-inner {
        width: 100%;
        max-width: 1100px;
        display: flex;
        align-items: center;
        padding: 0 2rem;
      }
      .logo { display: flex; align-items: center; gap: 0.5rem; flex-shrink: 0; text-decoration: none; margin-right: 2rem; }
      .logo-dots { display: flex; gap: 4px; }
      .logo-dots span { width: 13px; height: 13px; border-radius: 50%; display: block; }
      .dot-o { background: #f97316; } .dot-g { background: #22c55e; } .dot-b { background: #3b82f6; }
      .logo-name { font-size: 1.5rem; font-weight: 900; color: #fff; text-decoration: none; letter-spacing: -0.02em; }
      
      .nav-links-wrap { display: flex; align-items: center; gap: 1.5rem; margin-left: auto; }
      .nav-links { display: flex; align-items: center; list-style: none; gap: 0.2rem; margin: 0; padding: 0; }
      .nav-links li a {
        color: #9ab; font-size: 0.75rem; font-weight: 700;
        letter-spacing: 0.1em; text-transform: uppercase;
        padding: 0.5rem 0.8rem; border-radius: 3px;
        transition: color 0.2s; display: block; text-decoration: none;
      }
      .nav-links li a:hover { color: #fff; }
      .nav-links li a.active { color: #fff; }

      .search-wrap { position: relative; display: flex; align-items: center; margin-left: 1rem; }
      .search-wrap input {
        height: 30px; width: 180px; padding: 0 1rem 0 1rem;
        background: #2c3440; border: none;
        border-radius: 15px; font-size: 0.8rem; font-family: inherit; color: #fff;
      }
      .search-wrap input:focus { outline: none; background: #3c4450; }
      .search-icon-btn { position: absolute; right: 0.8rem; background: none; border: none; color: rgba(255,255,255,0.3); font-size: 0.8rem; cursor: pointer; }

      @media (max-width: 992px) { 
        .header { height: auto; padding-bottom: 4px; }
        .header-inner { flex-direction: column; align-items: flex-start; padding: 0.5rem 1rem; gap: 0.5rem; }
        .nav-links-wrap { margin-left: 0; width: 100%; overflow-x: auto; -webkit-overflow-scrolling: touch; padding-bottom: 2px; }
        .nav-links { display: flex; width: max-content; }
        .search-wrap { margin-left: auto; margin-right: 0.5rem; }
      }
    </style>
    <div class="header-inner">
      <a class="logo" th:href="@{/}">
        <div class="logo-dots">
          <span class="dot-o"></span><span class="dot-g"></span><span class="dot-b"></span>
        </div>
        <span class="logo-name">Letterboxd</span>
      </a>
      <div class="nav-links-wrap">
        <ul class="nav-links">
          <li th:if="${session.loggedInUser == null}"><a th:href="@{/auth/login}">Sign In</a></li>
          <li th:if="${session.loggedInUser == null}"><a th:href="@{/auth/register}">Create Account</a></li>
          <li th:if="${session.loggedInUser != null}"><a th:href="@{/profile}" th:classappend="${activeTab == 'profile' ? 'active' : ''}" th:text="${session.loggedInUser.username}">Account</a></li>
          <li><a th:href="@{/}" th:classappend="${activeTab == 'films' ? 'active' : ''}">Films</a></li>
          <li><a th:href="@{/lists}" th:classappend="${activeTab == 'lists' ? 'active' : ''}">Lists</a></li>
          <li><a th:href="@{/members}" th:classappend="${activeTab == 'members' ? 'active' : ''}">Members</a></li>
          <li th:if="${session.loggedInUser != null}"><a th:href="@{/auth/logout}">Sign Out</a></li>
        </ul>
        <form class="search-wrap" th:action="@{/search}" method="get">
          <input type="text" name="q" placeholder=""/>
          <button class="search-icon-btn" type="submit"><i class="bi bi-search"></i></button>
        </form>
      </div>
    </div>
  </header>
</html>
