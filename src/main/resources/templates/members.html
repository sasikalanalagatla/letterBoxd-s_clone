<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Members — Letterboxd Clone</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet" />
    <style>
      body { background-color: #14181c; color: #c8d0d8; }

      /* ── NAV ── */
      .bg-darker { background-color: #1a1a1a !important; border-bottom: 1px solid #333; }
      .navbar-brand { font-weight: 700; font-size: 1.5rem; color: #00c030 !important; }
      .navbar-brand:hover { color: #00e040 !important; }
      .nav-search-input {
        background-color: #2c3440 !important;
        color: #c8d0d8 !important;
        border-color: #456 !important;
        min-width: 220px;
      }
      .nav-search-input::placeholder { color: #667 !important; }
      .nav-search-input:focus { box-shadow: 0 0 0 2px rgba(0,192,48,.3) !important; border-color: #00c030 !important; }
      .nav-search-btn { border-color: #456 !important; color: #c8d0d8 !important; }
      .nav-search-btn:hover { background-color: #00c030 !important; border-color: #00c030 !important; color: #fff !important; }
      .nav-link-members { color: #00c030 !important; font-weight: 600; }

      /* ── PAGE HEADER ── */
      .page-hero {
        background: linear-gradient(135deg, #1a1f25 0%, #0d1117 100%);
        border-bottom: 1px solid #2c3440;
        padding: 3rem 0 2.5rem;
        margin-bottom: 2.5rem;
      }
      .page-hero h1 {
        font-size: 2.2rem;
        font-weight: 800;
        color: #fff;
        letter-spacing: -0.02em;
        margin-bottom: 0.4rem;
      }
      .count-badge {
        display: inline-block;
        background: rgba(0,192,48,.15);
        color: #00c030;
        border: 1px solid rgba(0,192,48,.3);
        border-radius: 20px;
        padding: 0.2rem 0.85rem;
        font-size: 0.85rem;
        font-weight: 600;
        vertical-align: middle;
        margin-left: 0.6rem;
      }
      .page-subtitle {
        color: #667;
        font-size: 0.95rem;
        margin-top: 0.4rem;
      }

      /* ── MEMBER CARDS ── */
      .member-card {
        display: flex;
        align-items: center;
        gap: 1rem;
        background: #1c2128;
        border: 1px solid #2c3440;
        border-radius: 10px;
        padding: 1rem 1.2rem;
        text-decoration: none;
        color: inherit;
        transition: border-color 0.2s, transform 0.15s, box-shadow 0.2s;
      }
      .member-card:hover {
        border-color: #00c030;
        color: inherit;
        transform: translateY(-2px);
        box-shadow: 0 4px 20px rgba(0,192,48,.1);
      }
      .member-avatar {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        object-fit: cover;
        border: 2px solid #2c3440;
        flex-shrink: 0;
        background: #2c3440;
        transition: border-color 0.2s;
      }
      .member-card:hover .member-avatar {
        border-color: #00c030;
      }
      .member-avatar-placeholder {
        width: 56px;
        height: 56px;
        border-radius: 50%;
        background: linear-gradient(135deg, #2c3440, #1a1f25);
        border: 2px solid #2c3440;
        flex-shrink: 0;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.3rem;
        font-weight: 700;
        color: #00c030;
        text-transform: uppercase;
        transition: border-color 0.2s;
      }
      .member-card:hover .member-avatar-placeholder {
        border-color: #00c030;
      }
      .member-info { flex: 1; min-width: 0; }
      .member-username {
        font-weight: 700;
        font-size: 0.97rem;
        color: #c8d0d8;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .member-display {
        font-size: 0.82rem;
        color: #667;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
      }
      .member-arrow {
        color: #2c3440;
        font-size: 0.9rem;
        transition: color 0.2s;
        flex-shrink: 0;
      }
      .member-card:hover .member-arrow { color: #00c030; }

      /* ── EMPTY STATE ── */
      .empty-state {
        text-align: center;
        padding: 5rem 1rem;
        color: #445;
      }
      .empty-state i { font-size: 3rem; display: block; margin-bottom: 1rem; }
    </style>
  </head>
  <body>
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-darker">
      <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}">Letterboxd</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                data-bs-target="#navbarNav" aria-controls="navbarNav"
                aria-expanded="false" aria-label="Toggle navigation">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <!-- Search -->
          <form class="d-flex ms-3 me-auto" th:action="@{/search}" method="get">
            <div class="input-group input-group-sm">
              <input type="text" name="q" class="form-control nav-search-input"
                     placeholder="Search films, people, lists…" />
              <button class="btn nav-search-btn" type="submit">
                <i class="bi bi-search"></i>
              </button>
            </div>
          </form>
          <ul class="navbar-nav">
            <!-- Members link (active on this page) -->
            <li class="nav-item me-2">
              <a class="nav-link nav-link-members" th:href="@{/members}">
                <i class="bi bi-people-fill me-1"></i>Members
              </a>
            </li>
            <!-- Unauthenticated -->
            <li class="nav-item" th:if="${session.loggedInUser == null}">
              <a class="nav-link" th:href="@{/auth/login}">Sign In</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser == null}">
              <a class="nav-link btn btn-primary btn-sm" th:href="@{/auth/register}"
                 style="margin-left:.5rem">Create Account</a>
            </li>
            <!-- Authenticated -->
            <li class="nav-item dropdown" th:if="${session.loggedInUser != null}">
              <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button"
                 data-bs-toggle="dropdown" aria-expanded="false">
                <span th:text="${session.loggedInUser.username}"></span>
              </a>
              <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                <li><a class="dropdown-item" th:href="@{/profile}">My Profile</a></li>
                <li><a class="dropdown-item" th:href="@{/lists}">All Lists</a></li>
                <li><a class="dropdown-item" th:href="@{/lists/create}">Create List</a></li>
                <li><hr class="dropdown-divider" /></li>
                <li><a class="dropdown-item text-danger" th:href="@{/auth/logout}">Logout</a></li>
              </ul>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <!-- Page Hero -->
    <div class="page-hero">
      <div class="container">
        <h1>
          <i class="bi bi-people-fill me-2" style="color:#00c030;"></i>Members
          <span class="count-badge" th:text="${totalCount}">0</span>
        </h1>
        <p class="page-subtitle">All registered members of this community</p>
      </div>
    </div>

    <!-- Members Grid -->
    <div class="container pb-5">
      <!-- Empty state -->
      <div th:if="${members.isEmpty()}" class="empty-state">
        <i class="bi bi-person-x"></i>
        <p>No members found.</p>
      </div>

      <!-- Grid -->
      <div th:if="${!members.isEmpty()}"
           class="row row-cols-1 row-cols-sm-2 row-cols-md-3 row-cols-lg-4 g-3">
        <div class="col" th:each="member : ${members}">
          <a th:href="@{/profile/{u}(u=${member.username})}" class="member-card">
            <!-- Avatar -->
            <img th:if="${member.avatarUrl != null}"
                 th:src="${member.avatarUrl}"
                 th:alt="${member.username}"
                 class="member-avatar"
                 loading="lazy"
                 onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';" />
            <div class="member-avatar-placeholder"
                 th:style="${member.avatarUrl != null} ? 'display:none' : 'display:flex'"
                 th:text="${member.username != null ? member.username.substring(0,1).toUpperCase() : '?'}">
            </div>
            <!-- Info -->
            <div class="member-info">
              <div class="member-username" th:text="${member.username}">username</div>
              <div class="member-display"
                   th:text="${member.displayName != null ? member.displayName : '@' + member.username}">
                Display Name
              </div>
            </div>
            <!-- Arrow -->
            <i class="bi bi-chevron-right member-arrow"></i>
          </a>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
