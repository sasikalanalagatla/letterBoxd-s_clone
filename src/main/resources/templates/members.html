<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Members - LetterBoxd's</title>
  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00c030;
      --green-dark: #009924;
      --bg-dark: #14181c;
      --bg-mid: #1c2228;
      --bg-card: #2c3440;
      --border: rgba(255, 255, 255, 0.08);
      --text-muted: #678;
      --text-dim: #9ab;
      --text: #ccc;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    body { font-family: "Titillium Web", sans-serif; background: var(--bg-dark); color: var(--text); min-height: 100vh; }
    a { text-decoration: none; color: inherit; }


    /* ── MAIN ── */
    .main { padding-top: 56px; }

    .hero-tagline { text-align: center; padding: 3.5rem 2rem 2rem; border-bottom: 1px solid var(--border); }
    .hero-tagline p { font-family: "Merriweather", serif; font-size: clamp(1.1rem, 2.5vw, 1.5rem); font-weight: 700; color: var(--text-dim); margin-bottom: 1.5rem; }

    .container { max-width: 1100px; margin: 0 auto; padding: 0 2rem; }

    /* ── SECTION HEADERS ── */
    .section-header { display: flex; align-items: center; justify-content: space-between; padding: 2.5rem 0 1.25rem; }
    .section-label { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.18em; text-transform: uppercase; color: var(--text-dim); }
    .section-all { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: var(--text-dim); transition: color 0.2s; }
    .section-all:hover { color: #fff; }

    /* ── SORT TABS ── */
    .sort-tabs { display: flex; gap: 2px; background: var(--bg-mid); border: 1px solid rgba(255,255,255,0.06); border-radius: 3px; overflow: hidden; padding: 2px; }
    .sort-tabs a { font-size: 0.68rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--text-muted); padding: 4px 12px; border-radius: 2px; transition: background .15s, color .15s; }
    .sort-tabs a:hover { color: #ccc; }
    .sort-tabs a.active { background: var(--bg-card); color: #fff; }

    /* ── FEATURED MEMBERS (3-col, matches featured-grid in lists) ── */
    .featured-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 2.5rem; }
    .featured-card { display: block; cursor: pointer; }

    .member-portrait {
      position: relative; height: 130px; border-radius: 4px; overflow: hidden;
      margin-bottom: 0.7rem; background: var(--bg-card); display: block;
    }
    .member-portrait img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.3s; display: block; }
    .featured-card:hover .member-portrait img { transform: scale(1.04); }
    .member-portrait-init {
      font-size: 3.5rem; font-weight: 700; color: #fff; text-transform: uppercase;
      font-family: "Merriweather", serif; width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      background: linear-gradient(135deg, #1d232a 0%, #00c030 100%);
    }
    .member-portrait::after { content: ''; position: absolute; inset: 0; background: linear-gradient(to top, rgba(0,0,0,0.6) 0%, transparent 55%); pointer-events: none; }
    .portrait-stats { position: absolute; bottom: 7px; left: 10px; z-index: 2; font-size: 0.7rem; color: rgba(255,255,255,0.75); font-weight: 600; display: flex; gap: 8px; }

    .featured-title { font-size: 0.9rem; font-weight: 700; color: #fff; margin-bottom: 0.35rem; transition: color 0.2s; }
    .featured-card:hover .featured-title { color: var(--green); }
    .featured-creator { display: flex; align-items: center; gap: 0.4rem; font-size: 0.72rem; color: var(--text-muted); }
    .creator-name { color: var(--text-dim); font-weight: 600; }

    /* ── ALL MEMBERS GRID (matches popular-grid in lists) ── */
    .popular-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1.5rem; margin-bottom: 3rem; }
    .popular-card { display: block; cursor: pointer; }

    .popular-title { font-size: 0.85rem; font-weight: 700; color: #fff; margin-bottom: 0.25rem; transition: color 0.2s; }
    .popular-card:hover .popular-title { color: var(--green); }
    .popular-meta { font-size: 0.68rem; color: var(--text-muted); display: flex; gap: 0.5rem; }

    /* ── DIVIDER ── */
    .section-divider { border: none; border-top: 1px solid var(--border); }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-muted); font-size: 0.85rem; }
    .empty-icon { font-size: 2.5rem; margin-bottom: 0.75rem; opacity: 0.5; }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .featured-grid, .popular-grid { grid-template-columns: 1fr; }
    }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: var(--bg-dark); }
    ::-webkit-scrollbar-thumb { background: #334; border-radius: 3px; }
  </style>
</head>
<body>

  <div th:replace="~{fragments/layout :: navbar(activeTab='members')}"></div>

  <!-- ── MAIN ── -->
  <main class="main">

    <!-- Hero tagline -->
    <div class="hero-tagline">
      <p>Film lovers, critics and friends &mdash; find and follow members.</p>
    </div>

    <div class="container">

      <!-- FEATURED MEMBERS -->
      <div th:if="${featuredMembers != null and !featuredMembers.isEmpty()}">
        <div class="section-header">
          <span class="section-label">Featured Members</span>
        </div>
        <div class="featured-grid">
          <a class="featured-card" th:each="m : ${featuredMembers}" th:href="@{/profile/{u}(u=${m.username})}">
            <div class="member-portrait">
              <img th:if="${m.avatarUrl != null}" th:src="${m.avatarUrl}" th:alt="${m.username}" loading="lazy"
                   onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
              <div class="member-portrait-init"
                   th:style="${m.avatarUrl != null} ? 'display:none' : 'display:flex'"
                   th:text="${m.username != null ? m.username.substring(0,1).toUpperCase() : '?'}"></div>
              <div class="portrait-stats">
                <span th:if="${m.filmsWatchedCount != null}" th:text="${m.filmsWatchedCount + ' films'}"></span>
              </div>
            </div>
            <div class="featured-title" th:text="${m.displayName != null ? m.displayName : m.username}">Name</div>
            <div class="featured-creator">
              <span class="creator-name" th:text="'@' + ${m.username}">@username</span>
            </div>
          </a>
        </div>
        <hr class="section-divider"/>
      </div>

      <!-- ALL MEMBERS -->
      <div class="section-header">
        <span class="section-label">
          All Members
          <span th:if="${totalCount != null}" style="font-weight:400;color:var(--text-muted);margin-left:6px" th:text="${totalCount}"></span>
        </span>
        <div class="sort-tabs">
          <a th:href="@{/members(sort='username_az')}" th:classappend="${sort == 'username_az' or sort == null ? ' active' : ''}">A&#8211;Z</a>
          <a th:href="@{/members(sort='username_za')}" th:classappend="${sort == 'username_za' ? ' active' : ''}">Z&#8211;A</a>
          <a th:href="@{/members(sort='joined_desc')}" th:classappend="${sort == 'joined_desc' ? ' active' : ''}">Newest</a>
          <a th:href="@{/members(sort='joined_asc')}"  th:classappend="${sort == 'joined_asc'  ? ' active' : ''}">Oldest</a>
        </div>
      </div>

      <!-- Empty -->
      <div th:if="${members == null or members.isEmpty()}" class="empty-state">
        <div class="empty-icon">&#128100;</div>
        <p>No members found.</p>
      </div>

      <!-- Cards -->
      <div class="popular-grid" th:if="${members != null and !members.isEmpty()}">
        <a class="popular-card" th:each="member : ${members}" th:href="@{/profile/{u}(u=${member.username})}">
          <div class="member-portrait">
            <img th:if="${member.avatarUrl != null}" th:src="${member.avatarUrl}" th:alt="${member.username}" loading="lazy"
                 onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
            <div class="member-portrait-init"
                 th:style="${member.avatarUrl != null} ? 'display:none' : 'display:flex'"
                 th:text="${member.username != null ? member.username.substring(0,1).toUpperCase() : '?'}"></div>
            <div class="portrait-stats">
              <span th:if="${member.filmsWatchedCount != null}" th:text="${member.filmsWatchedCount + ' films'}"></span>
            </div>
          </div>
          <div class="popular-title" th:text="${member.username}">username</div>
          <div class="popular-meta">
            <span th:text="${member.displayName != null ? member.displayName : '@' + member.username}">Display</span>
            <span th:if="${member.filmsWatchedCount != null}">&#183;</span>
            <span th:if="${member.filmsWatchedCount != null}" th:text="${member.filmsWatchedCount + ' films'}"></span>
          </div>
        </a>
      </div>

    </div><!-- /container -->
  </main>

</body>
</html>
