<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${profile.displayName} + ' - Letterboxd Clone'"></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .profile-header {
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
        padding: 3rem 0;
        border-bottom: 1px solid #333;
      }
      .avatar {
        width: 150px;
        height: 150px;
        border-radius: 50%;
        object-fit: cover;
        border: 3px solid #556b2f;
        background-color: #333;
      }
      .profile-info {
        margin-left: 2rem;
      }
      .username {
        font-size: 2.5rem;
        font-weight: 700;
        color: #fff;
        margin-bottom: 0.5rem;
      }
      .display-name {
        font-size: 1.2rem;
        color: #999;
        margin-bottom: 1rem;
      }
      .bio {
        color: #ccc;
        font-size: 1rem;
        margin-top: 1rem;
        line-height: 1.6;
        max-width: 600px;
      }
      .joined-date {
        color: #666;
        font-size: 0.9rem;
        margin-top: 1rem;
      }
      .btn-edit {
        background-color: #556b2f;
        border: none;
        color: white;
        margin-top: 1rem;
      }
      .btn-edit:hover {
        background-color: #6b8e23;
        color: white;
      }
      .btn-follow {
        background-color: #556b2f;
        border: none;
        color: white;
        margin-top: 1rem;
        margin-left: 0.5rem;
      }
      .btn-follow:hover {
        background-color: #6b8e23;
        color: white;
      }
      .btn-unfollow {
        background-color: #4a5a1f;
        border: 1px solid #556b2f;
        color: #556b2f;
        margin-top: 1rem;
        margin-left: 0.5rem;
      }
      .btn-unfollow:hover {
        background-color: #556b2f;
        color: white;
      }
      .stats-section {
        display: flex;
        gap: 2rem;
        margin-top: 2rem;
        flex-wrap: wrap;
      }
      .stat-card {
        background: #1a1a1a;
        padding: 1.5rem;
        border-radius: 8px;
        border: 1px solid #333;
        text-align: center;
        flex: 1;
        min-width: 120px;
      }
      .stat-number {
        font-size: 2rem;
        font-weight: 700;
        color: #556b2f;
      }
      .stat-label {
        color: #999;
        font-size: 0.9rem;
        margin-top: 0.5rem;
      }
      .content-section {
        margin-top: 3rem;
      }
      .section-title {
        font-size: 1.5rem;
        margin-bottom: 1.5rem;
        border-bottom: 2px solid #333;
        padding-bottom: 1rem;
      }
      .empty-message {
        color: #666;
        text-align: center;
        padding: 2rem;
        background: #1a1a1a;
        border-radius: 8px;
      }

      /* replicate card grid styles from lists.html */
      .popular-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1.5rem;
        margin-bottom: 3rem;
      }

      .popular-card {
        display: block;
        cursor: pointer;
      }

      .popular-strip {
        display: flex;
        height: 105px;
        border-radius: 4px;
        overflow: hidden;
        margin-bottom: 0.6rem;
        gap: 2px;
        background: #1e1e1e;
      }

      .popular-strip .strip-img {
        flex: 1;
        overflow: hidden;
      }

      .popular-strip .strip-img img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.3s;
      }

      .popular-card:hover .popular-strip .strip-img img {
        transform: scale(1.05);
      }
    </style>
  </head>
  <body class="bg-dark text-light">
    <!-- Navigation Bar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-darker mb-5">
      <div class="container-fluid">
        <a
          class="navbar-brand"
          th:href="@{/}"
          style="font-weight: 700; font-size: 1.5rem"
        >
          Letterboxd
        </a>
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav ms-auto">
            <li class="nav-item" th:if="${session.loggedInUser == null}">
              <a class="nav-link" th:href="@{/auth/login}">Sign In</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser != null}">
              <a class="nav-link" th:href="@{/profile}">My Profile</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser != null}">
              <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <style>
      .bg-darker {
        background-color: #1a1a1a !important;
        border-bottom: 1px solid #333;
      }
      .navbar-brand:hover {
        color: #556b2f !important;
      }
    </style>

    <!-- Profile Header -->
    <div class="profile-header">
      <div class="container">
        <div class="d-flex align-items-flex-start">
          <img
            th:src="${profile.avatarUrl} ?: 'https://via.placeholder.com/150?text=' + ${profile.username}"
            alt="Avatar"
            class="avatar"
          />
          <div class="profile-info">
            <div class="username" th:text="${profile.username}"></div>
            <div class="display-name">
              <span th:text="${profile.displayName}"></span>
              <small class="text-warning" th:if="${profile.isAdmin}">(admin)</small>
            </div>
            <div class="bio" th:text="${profile.bio}"></div>
            <div class="joined-date">
              Joined
              <span
                th:text="${#temporals.format(profile.joinedAt, 'MMM d, yyyy')}"
              ></span>
            </div>
            <div>
              <a
                th:if="${isOwnProfile}"
                th:href="@{/profile/edit}"
                class="btn btn-edit"
              >
                Edit Profile
              </a>
              <form 
                th:if="${!isOwnProfile && session.loggedInUserId != null}"
                th:action="@{/profile/{username}/(username=${profile.username})}"
                method="post"
                style="display: inline;">
                <button 
                  type="submit"
                  th:if="${!isFollowing}"
                  th:formaction="@{/profile/{username}/follow(username=${profile.username})}"
                  class="btn btn-follow">
                  Follow
                </button>
                <button 
                  type="submit"
                  th:if="${isFollowing}"
                  th:formaction="@{/profile/{username}/unfollow(username=${profile.username})}"
                  class="btn btn-unfollow">
                  Unfollow
                </button>
              </form>
            </div>
          </div>
        </div>

        <!-- Stats -->
        <div class="stats-section">
          <div class="stat-card">
            <div
              class="stat-number"
              th:text="${profile.filmsWatchedCount}"
            ></div>
            <div class="stat-label">Films Watched</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" th:text="${profile.reviewCount}"></div>
            <div class="stat-label">Reviews</div>
          </div>
          <div class="stat-card">
            <div class="stat-number" th:text="${profile.listCount}"></div>
            <div class="stat-label">Lists</div>
          </div>
          <div class="stat-card">
            <a th:href="@{/profile/{username}/following(username=${profile.username})}" style="color:inherit; text-decoration:none">
              <div class="stat-number" th:text="${profile.followingCount}"></div>
              <div class="stat-label">Following</div>
            </a>
          </div>
          <div class="stat-card">
            <a th:href="@{/profile/{username}/followers(username=${profile.username})}" style="color:inherit; text-decoration:none">
              <div class="stat-number" th:text="${profile.followersCount}"></div>
              <div class="stat-label">Followers</div>
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- Content -->
    <div class="container content-section">
      <h2 class="section-title">Recent Activity</h2>
      <div class="empty-message">
        No activity yet. Watch some films and share your thoughts!
      </div>
    </div>

    <!-- Lists Section -->
    <div class="container content-section">
      <h2 class="section-title">Lists</h2>

      <!-- show a few recent or featured lists on the profile -->
      <div th:if="${profileLists != null and !profileLists.isEmpty()}">
        <div class="popular-grid">
          <a
            class="popular-card"
            th:each="list : ${profileLists}"
            th:href="@{/lists/{id}(id=${list.id})}"
          >
            <!-- Poster strip: up to 4 images side by side -->
            <div
              class="popular-strip"
              th:if="${list.previewPosterPaths != null and !list.previewPosterPaths.isEmpty()}"
            >
              <div
                class="strip-img"
                th:each="path : ${list.previewPosterPaths}"
              >
                <img
                  th:src="${path}"
                  loading="lazy"
                />
              </div>
            </div>

            <div class="popular-card-title" th:text="${list.name}">List Name</div>
          </a>
        </div>
      </div>
      <!-- no 'view all' link; clicking a card navigates inside -->
      <div th:if="${profileLists == null or profileLists.isEmpty()}">
        <div class="empty-message">No lists created yet.</div>
      </div>
    </div>

    <!-- Reviews Section -->
    <div class="container content-section">
      <h2 class="section-title">Reviews</h2>
      <div th:if="${profileReviews != null and !profileReviews.isEmpty()}">
        <div class="row row-cols-2 row-cols-md-4 row-cols-lg-5 g-4">
          <div class="col" th:each="review : ${profileReviews}">
            <div class="card bg-secondary h-100 border-0">
              <a th:href="@{/movies/{id}(id=${review.movieId})}">
                <img th:src="${'https://image.tmdb.org/t/p/w780' + review.moviePosterPath}"
                     class="card-img-top"
                     th:alt="${review.movieTitle}"
                     style="height: 250px; object-fit: cover;" />
              </a>
              <div class="card-body text-center">
                <small class="text-muted" th:text="${#temporals.format(review.publishedAt, 'MMM d, yyyy')}"></small>
                <div class="mt-2">
                  <a class="btn btn-sm btn-outline-light"
                     th:if="${session.loggedInUser != null and session.loggedInUser.id == profile.id}"
                     th:href="@{/reviews/{id}/edit(id=${review.id})}">Edit</a>
                  <form th:if="${session.loggedInUser != null and (session.loggedInUser.id == profile.id or session.loggedInUser.isAdmin)}"
                        th:action="@{/reviews/{id}/delete(id=${review.id})}"
                        method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
      <div th:if="${profileReviews == null or profileReviews.isEmpty()}">
        <div class="empty-message">No reviews written yet.</div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
