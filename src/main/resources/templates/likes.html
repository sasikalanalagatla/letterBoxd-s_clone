<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${profile.username} + ' • Likes • Letterboxd\'s'"></title>

  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green: #00c030;
      --bg-dark: #14181c;
      --bg-card: #2c3440;
      --border: rgba(255,255,255,0.08);
      --text: #ccc;
      --text-dim: #9ab;
      --text-muted: #678;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Titillium Web", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      padding-top: 56px;
    }

    a { text-decoration: none; color: inherit; }


    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      font-family: "Merriweather", serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dim);
      padding: 2.5rem 0 0;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    /* ── USER MINI HEADER (profile bar) ── */
    .user-mini-header {
      display: flex;
      align-items: center;
      background-color: var(--bg-card);
      border-radius: 4px;
      padding: .5rem 1rem;
      margin: 2rem 0 1.5rem;
      border: 1px solid var(--border);
    }

    .user-mini-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
    }

    .user-mini-name {
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      margin-right: auto;
    }

    .user-mini-nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .user-mini-nav a {
      color: var(--text-dim);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 600;
      transition: color .2s;
    }

    .user-mini-nav a:hover { color: #fff; }
    .user-mini-nav a.active {
      color: var(--green);
      border-bottom: 2px solid var(--green);
      padding-bottom: 2px;
    }

    /* ── LIKED FILMS GRID ── */
    .movie-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-bottom: 2rem;
    }

    .movie-card img {
      width: 80px;
      height: 120px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      display: block;
      transition: transform .2s;
    }

    .movie-card img:hover { transform: scale(1.05); }

    /* ── LIKED REVIEWS LIST ── */
    .review-list {
      display: flex;
      flex-direction: column;
      gap: .8rem;
      margin-bottom: 3rem;
    }

    .review-card-mini {
      display: flex;
      gap: 1rem;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: .8rem 1rem;
      transition: border-color .2s;
    }

    .review-card-mini:hover { border-color: rgba(255,255,255,0.2); }

    .review-poster-mini img {
      width: 52px;
      height: 78px;
      object-fit: cover;
      border-radius: 3px;
      border: 1px solid var(--border);
      display: block;
    }

    .review-content { flex: 1; }

    .review-meta-row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 5px;
    }

    .review-movie-title {
      color: #fff;
      font-weight: 700;
      font-size: .9rem;
    }

    .review-movie-title:hover { color: var(--green); }

    .review-author-label {
      font-size: .75rem;
      color: var(--text-muted);
      margin-left: .4rem;
    }

    .review-date-label {
      font-size: .75rem;
      color: var(--text-muted);
      white-space: nowrap;
    }

    .review-body-text {
      color: #bcd;
      font-size: .85rem;
      line-height: 1.6;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      background: var(--bg-card);
      border-radius: 4px;
      margin-bottom: 2rem;
      font-size: .85rem;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .review-meta-row { flex-direction: column; gap: .3rem; }
    }
  </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar(activeTab='profile')}"></div>

<!-- ── MAIN ── -->
<main>
  <div class="container">

    <!-- Profile bar -->
    <div th:replace="~{fragments/profile-header :: profile-header(${profile}, 'likes')}"></div>

    <!-- ── LIKED FILMS ── -->
    <div class="section-header">
      <span class="section-label">Liked Films</span>
    </div>

    <div class="movie-grid"
         th:if="${likedMovies != null and !likedMovies.isEmpty()}">
      <div class="movie-card" th:each="movie : ${likedMovies}">
        <a th:href="@{/movies/{id}(id=${movie.id})}">
          <img th:src="${movie.poster_path != null ? 'https://image.tmdb.org/t/p/w200' + movie.poster_path : '/img/no-poster.png'}"
               th:alt="${movie.title}" />
        </a>
      </div>
    </div>

    <div class="empty-state"
         th:if="${likedMovies == null or likedMovies.isEmpty()}">
      No liked films yet.
    </div>

    <!-- ── LIKED REVIEWS ── -->
    <div class="section-header">
      <span class="section-label">Liked Reviews</span>
    </div>

    <div class="review-list"
         th:if="${likedReviews != null and !likedReviews.isEmpty()}">
      <div class="review-card-mini" th:each="review : ${likedReviews}">
        <div class="review-poster-mini">
          <img th:src="${review.moviePosterPath != null ? 'https://image.tmdb.org/t/p/w200' + review.moviePosterPath : '/img/no-poster.png'}"
               th:alt="${review.movieTitle}" />
        </div>
        <div class="review-content">
          <div class="review-meta-row">
            <div>
              <a class="review-movie-title"
                 th:href="@{/movies/{id}(id=${review.movieId})}"
                 th:text="${review.movieTitle}"></a>
              <span class="review-author-label"
                    th:text="'reviewed by ' + ${review.author != null ? review.author.username : 'unknown'}"></span>
            </div>
            <div class="review-date-label"
                 th:text="${review.publishedAt != null ? #temporals.format(review.publishedAt, 'MMM d, yyyy') : ''}"></div>
          </div>
          <div class="review-body-text" th:text="${review.body}"></div>
        </div>
      </div>
    </div>

    <div class="empty-state"
         th:if="${likedReviews == null or likedReviews.isEmpty()}">
      No liked reviews yet.
    </div>

  </div>
</main>

</body>
</html>
