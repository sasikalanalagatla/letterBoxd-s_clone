<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${username} + ' • Lists • Letterboxd\'s'"></title>

  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet"/>

  <style>
    :root {
      --green: #00c030;
      --bg-dark: #14181c;
      --bg-card: #2c3440;
      --border: rgba(255,255,255,0.08);
      --text: #ccc;
      --text-dim: #9ab;
      --text-muted: #678;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Titillium Web", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      padding-top: 56px;
    }

    a { text-decoration: none; color: inherit; }


    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── USER MINI HEADER (profile bar) ── */
    .user-mini-header {
      display: flex;
      align-items: center;
      background-color: var(--bg-card);
      border-radius: 4px;
      padding: .5rem 1rem;
      margin: 2rem 0 1.5rem;
      border: 1px solid var(--border);
    }

    .user-mini-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
    }

    .user-mini-name {
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      margin-right: auto;
    }

    .user-mini-nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .user-mini-nav a {
      color: var(--text-dim);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 600;
      transition: color .2s;
    }

    .user-mini-nav a:hover { color: #fff; }
    .user-mini-nav a.active {
      color: var(--green);
      border-bottom: 2px solid var(--green);
      padding-bottom: 2px;
    }

    /* ── LISTS GRID ── */
    .lists-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-bottom: 3rem;
    }

    .list-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      padding: 1rem;
      border-radius: 4px;
      cursor: pointer;
      transition: border-color .2s;
    }

    .list-card:hover { border-color: rgba(255,255,255,0.2); }

    .popular-strip {
      display: flex;
      height: 105px;
      border-radius: 4px;
      overflow: hidden;
      gap: 2px;
      background: #1e1e1e;
      margin-bottom: 0.8rem;
    }

    .popular-strip .strip-img { flex: 1; overflow: hidden; }

    .popular-strip .strip-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.3s;
    }

    .list-card:hover .strip-img img { transform: scale(1.05); }

    .list-title {
      font-weight: 700;
      color: #fff;
      font-size: 1rem;
      margin-bottom: 0.3rem;
    }

    .list-meta {
      font-size: 0.75rem;
      color: var(--text-dim);
    }

    .badge-ranked {
      display: inline-block;
      font-size: .65rem;
      text-transform: uppercase;
      background: #456;
      color: #abc;
      border-radius: 3px;
      padding: 1px 6px;
      margin-left: .5rem;
    }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      font-family: "Merriweather", serif;
      font-size: 1rem;
      font-weight: 700;
    }

    .back-link {
        display: inline-block;
        margin: 1rem 0;
        font-size: 0.8rem;
        color: var(--text-dim);
    }
    .back-link:hover { color: #fff; }

    @media (max-width: 1024px) {
      .lists-grid { grid-template-columns: repeat(2, 1fr); }
    }

    @media (max-width: 768px) {
      .lists-grid { grid-template-columns: 1fr; }
      .nav-links { display: none; }
    }
  </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar(activeTab='profile')}"></div>

<!-- ── MAIN ── -->
<main>
  <div class="container">

    <!-- Profile bar -->
    <div th:replace="~{fragments/profile-header :: profile-header(${profile}, 'lists')}"></div>

    <a th:href="@{/lists}" class="back-link">← Back to All Lists</a>

    <div class="section-header">
      <span class="section-label" th:text="${username} + '’s Lists'"></span>
    </div>

    <!-- Lists Grid -->
    <div class="lists-grid" th:if="${!lists.isEmpty()}">
      <div class="list-card"
           th:each="list : ${lists}"
           th:onclick="|window.location.href='/lists/' + ${list.id}|">

        <div class="popular-strip"
             th:if="${list.previewPosterPaths != null and !list.previewPosterPaths.isEmpty()}">
          <div class="strip-img" th:each="path : ${list.previewPosterPaths}">
            <img th:src="${'https://image.tmdb.org/t/p/w200' + path}" />
          </div>
        </div>

        <div class="list-title" th:text="${list.name}">List Name</div>
        <div class="list-meta">
          <span th:text="${list.entryCount + ' films'}"></span>
          <span class="badge-ranked" th:if="${list.ranked}">Ranked</span>
        </div>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" th:if="${lists.isEmpty()}">
      <p th:text="${username} + ' has not created any lists yet.'"></p>
    </div>

  </div>
</main>

</body>
</html>
