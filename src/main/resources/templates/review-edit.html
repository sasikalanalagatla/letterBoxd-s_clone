<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Review - Letterboxd</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
</head>
<body class="bg-dark text-light" style="padding-top: 56px;">
    <div th:replace="~{fragments/layout :: navbar(activeTab='profile')}"></div>
<div class="container py-5">
    <h2>Edit Review</h2>
    <form th:object="${reviewForm}" method="post" th:action="@{/reviews/{id}/edit(id=${reviewForm.id})}">
        <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
            <ul class="mb-0">
                <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
            </ul>
        </div>
        <div class="mb-3">
            <label for="body" class="form-label">Your review</label>
            <textarea class="form-control" id="body" rows="5" th:field="*{body}"></textarea>
        </div>
        <button type="submit" class="btn btn-primary">Save</button>
        <a th:href="@{/profile/{user}(user=${session.loggedInUser.username})}" class="btn btn-secondary ms-2">Cancel</a>
    </form>
</div>
</body>
</html>
