<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Choose New Password - Letterboxd Clone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      }
      .container {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
      }
      .card {
        border: none;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }
      .btn-primary {
        background-color: #556b2f;
        border: none;
      }
      .btn-primary:hover {
        background-color: #6b8e23;
      }
    </style>
  </head>
  <body class="bg-dark">
    <div class="container">
      <div class="card bg-light">
        <div class="card-body p-4">
          <h4 class="card-title mb-4 text-center">Set a New Password</h4>

          <div
            class="alert alert-danger"
            th:if="${error}"
            th:text="${error}"
          ></div>

          <form method="post" th:action="@{/auth/reset}">
            <input type="hidden" name="token" th:value="${token}" />
            <div class="mb-3">
              <label for="password" class="form-label">New password</label>
              <input
                type="password"
                class="form-control"
                id="password"
                name="password"
                placeholder="Minimum 8 characters"
                required
              />
            </div>
            <div class="mb-3">
              <label for="confirmPassword" class="form-label">Confirm password</label>
              <input
                type="password"
                class="form-control"
                id="confirmPassword"
                name="confirmPassword"
                required
              />
            </div>
            <button type="submit" class="btn btn-primary w-100">
              Update password
            </button>
          </form>

          <div class="signup-link text-center mt-3">
            <a th:href="@{/auth/login}">Back to sign in</a>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
