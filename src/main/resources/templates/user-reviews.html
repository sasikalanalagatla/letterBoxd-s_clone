<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${profile.username} + ' • Reviews • Letterboxd\'s'"></title>

  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green: #00c030;
      --bg-dark: #14181c;
      --bg-card: #2c3440;
      --border: rgba(255,255,255,0.08);
      --text: #ccc;
      --text-dim: #9ab;
      --text-muted: #678;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Titillium Web", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      padding-top: 56px;
    }

    a { text-decoration: none; color: inherit; }

    /* ── HEADER ── */
    .header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 56px;
      display: flex;
      align-items: center;
      padding: 0 2rem;
      background: #14181c;
      border-bottom: 1px solid var(--border);
      z-index: 100;
    }

    .logo {
      display: flex;
      align-items: center;
      gap: .5rem;
      margin-right: 2rem;
      color: #fff;
      font-weight: 700;
    }

    .logo-dots span {
      width: 13px; height: 13px; border-radius: 50%; display: inline-block;
    }
    .dot-o { background: #f97316; }
    .dot-g { background: #22c55e; }
    .dot-b { background: #3b82f6; }

    .nav-links {
      display: flex;
      list-style: none;
      gap: .5rem;
      flex: 1;
    }

    .nav-links a {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--text-dim);
      padding: .4rem .8rem;
    }

    .nav-links a.active,
    .nav-links a:hover { color: #fff; }

    .search-wrap input {
      height: 30px;
      padding: 0 .8rem;
      border-radius: 15px;
      border: 1px solid var(--border);
      background: #222;
      color: #fff;
      font-size: .8rem;
    }

    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 1rem;
    }

    .section-label {
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    /* ── PAGE TITLE ── */
    .page-title {
      font-family: "Merriweather", serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text-dim);
      padding: 2.5rem 0 0;
    }

    /* ── USER MINI HEADER (profile bar) ── */
    .user-mini-header {
      display: flex;
      align-items: center;
      background-color: var(--bg-card);
      border-radius: 4px;
      padding: .5rem 1rem;
      margin: 2rem 0 1.5rem;
      border: 1px solid var(--border);
    }

    .user-mini-avatar {
      width: 28px; height: 28px;
      border-radius: 50%;
      object-fit: cover;
      margin-right: 10px;
    }

    .user-mini-name {
      color: #fff;
      font-weight: 700;
      font-size: .95rem;
      margin-right: auto;
    }

    .user-mini-nav {
      display: flex;
      gap: 1rem;
      align-items: center;
    }

    .user-mini-nav a {
      color: var(--text-dim);
      font-size: .75rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      font-weight: 600;
      transition: color .2s;
    }

    .user-mini-nav a:hover { color: #fff; }
    .user-mini-nav a.active {
      color: var(--green);
      border-bottom: 2px solid var(--green);
      padding-bottom: 2px;
    }

    /* ── REVIEWS GRID ── */
    .reviews-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 1.2rem;
      margin-bottom: 3rem;
      margin-top: 1.5rem;
    }

    .review-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      transition: border-color .2s;
    }

    .review-card:hover { border-color: rgba(255,255,255,0.2); }

    .review-card img {
      width: 100%;
      aspect-ratio: 2/3;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }

    .review-card:hover img { transform: scale(1.05); }

    .review-card-body {
      padding: .5rem;
      text-align: center;
      background: rgba(0,0,0,0.3);
    }

    .review-card-title {
      font-weight: 700;
      color: #fff;
      font-size: .75rem;
      line-height: 1.3;
      height: 2.4rem;
      overflow: hidden;
      margin-bottom: .3rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .review-date {
      font-size: .7rem;
      color: var(--text-muted);
    }

    .review-actions {
      display: flex;
      gap: .3rem;
      justify-content: center;
      margin-top: .5rem;
      flex-wrap: wrap;
    }

    .btn-edit {
      padding: .2rem .5rem;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 3px;
      font-size: .68rem;
      color: var(--text-dim);
      font-family: "Titillium Web", sans-serif;
      background: transparent;
      cursor: pointer;
      transition: color .2s, border-color .2s;
    }

    .btn-edit:hover { color: #fff; border-color: #fff; }

    .btn-delete {
      padding: .2rem .5rem;
      border: none;
      border-radius: 3px;
      font-size: .68rem;
      background: #c0392b;
      color: #fff;
      font-family: "Titillium Web", sans-serif;
      cursor: pointer;
    }

    .btn-delete:hover { background: #e74c3c; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
    }

    .empty-state p {
      font-family: "Merriweather", serif;
      font-size: 1rem;
      font-weight: 700;
    }

    @media (max-width: 1024px) {
      .reviews-grid { grid-template-columns: repeat(4, 1fr); }
    }

    @media (max-width: 768px) {
      .reviews-grid { grid-template-columns: repeat(3, 1fr); }
      .nav-links { display: none; }
    }

    @media (max-width: 480px) {
      .reviews-grid { grid-template-columns: repeat(2, 1fr); }
    }
  </style>
</head>

<body>

<!-- ── HEADER ── -->
<header class="header">
  <a class="logo" th:href="@{/}">
    <div class="logo-dots">
      <span class="dot-o"></span><span class="dot-g"></span><span class="dot-b"></span>
    </div>
    <span class="logo-name">Letterboxd's</span>
  </a>
  <ul class="nav-links">
    <li><a th:href="@{/auth/login}"    class="bright" th:if="${session.loggedInUser == null}">Sign In</a></li>
    <li><a th:href="@{/auth/register}" class="bright" th:if="${session.loggedInUser == null}">Create Account</a></li>
    <li><a th:href="@{/profile}" class="bright" th:if="${session.loggedInUser != null}" th:text="${session.loggedInUser.username}">Profile</a></li>
    <li><a th:href="@{/}">Films</a></li>
    <li><a th:href="@{/lists}">Lists</a></li>
    <li><a th:href="@{/members}">Members</a></li>
    <li th:if="${session.loggedInUser != null}"><a th:href="@{/auth/logout}">Logout</a></li>
  </ul>
  <form class="search-wrap" th:action="@{/search}" method="get">
    <input type="text" name="q" placeholder="Films, people, lists..."/>
    <button class="search-icon-btn" type="submit">&#128269;</button>
  </form>
</header>

<!-- ── MAIN ── -->
<main>
  <div class="container">

    <!-- Profile bar -->
    <div th:replace="~{fragments/profile-header :: profile-header(${profile}, 'reviews')}"></div>

    <!-- ── REVIEWS GRID ── -->
    <div class="reviews-grid"
         th:if="${profileReviews != null and !profileReviews.isEmpty()}">

      <div class="review-card" th:each="review : ${profileReviews}">
        <a th:href="@{/movies/{id}(id=${review.movieId})}">
          <img th:src="${review.moviePosterPath != null ? 'https://image.tmdb.org/t/p/w500' + review.moviePosterPath : '/img/no-poster.png'}"
               th:alt="${review.movieTitle}" />
        </a>
        <div class="review-card-body">
          <div class="review-card-title">
            <a th:href="@{/movies/{id}(id=${review.movieId})}"
               th:text="${review.movieTitle}"
               style="color:#fff;"></a>
          </div>
          <div class="review-date"
               th:text="${review.publishedAt != null ? #temporals.format(review.publishedAt, 'MMM d, yyyy') : ''}"></div>
          <div class="review-actions"
               th:if="${isOwnProfile or (session.loggedInUser != null and session.loggedInUser.isAdmin)}">
            <a class="btn-edit"
               th:if="${isOwnProfile}"
               th:href="@{/reviews/{id}/edit(id=${review.id})}">Edit</a>
            <form th:action="@{/reviews/{id}/delete(id=${review.id})}"
                  method="post" style="display:inline;">
              <button type="submit" class="btn-delete">Delete</button>
            </form>
          </div>
        </div>
      </div>

    </div>

    <!-- Empty state -->
    <div class="empty-state"
         th:if="${profileReviews == null or profileReviews.isEmpty()}">
      <p>No reviews found.</p>
    </div>

  </div>
</main>

</body>
</html>
