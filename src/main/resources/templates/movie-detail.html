<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${movie.title} + ' - Letterboxd'"></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
</head>
<body class="bg-dark text-light">
<div class="container py-4">
    <a th:href="@{/}" class="btn btn-secondary mb-3">◀ Back</a>

    <div class="row">
        <div class="col-md-4">
            <img th:src="${movie.posterUrl}" class="img-fluid" th:alt="${movie.title}" />
        </div>
        <div class="col-md-8">
            <h1 th:text="${movie.title}"></h1>
            <p class="text-muted" th:if="${movie.tagline}" th:text="${movie.tagline}"></p>
            <div class="mb-2">
                <small th:if="${movie.year}"><strong th:text="${movie.year}"></strong></small>
                <small th:if="${movie.runtime}"> • <span th:text="${movie.runtime}"></span> min</small>
            </div>
            <div class="movie-stats mb-3">
                <small class="me-3">
                    <i class="bi bi-chat-left-text"></i>
                    <span th:text="${movie.reviewCount}">0</span> reviews
                </small>
                <small class="me-3">
                    <i class="bi bi-heart"></i>
                    <span th:text="${movie.likeCount}">0</span> likes
                </small>
                <small th:if="${movie.averageLetterboxdRating != null}">
                    <i class="bi bi-star-fill"></i>
                    <span th:text="${movie.averageLetterboxdRating}">N/A</span> avg rating
                </small>
            </div>
            <div class="mb-3" th:if="${session.loggedInUser != null}">
                <form th:action="@{/movies/{id}/like(id=${movie.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-heart-fill"></i> Like this movie
                    </button>
                </form>
            </div>
            <p th:text="${movie.overview}"></p>
        </div>
    </div>

    <!-- review form and list -->
    <div class="row mt-5">
        <div class="col-12">
            <!-- form only visible to logged-in users -->
            <div th:if="${session.loggedInUser != null}">
                <h4>Write a review</h4>

                <form th:object="${reviewForm}"
                      method="post"
                      th:action="@{/movies/{id}/reviews(id=${movie.id})}">
                    <!-- display validation errors if any (must be inside form) -->
                    <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                        </ul>
                    </div>
                    <input type="hidden" th:field="*{movieId}" />

                    <div class="mb-3">
                        <label for="body" class="form-label">Your review</label>
                        <textarea class="form-control" id="body" rows="5" th:field="*{body}" placeholder="Write your review"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <h4 th:if="${reviews.size() > 0}">Reviews</h4>
            <p th:if="${reviews.size() == 0}" class="text-muted">No reviews yet</p>

            <div th:each="review : ${reviews}" class="card bg-secondary text-light mb-3">
                <div class="card-body">
                    <h6 class="card-subtitle mb-2 text-muted">
                        <span th:text="${review.author.displayName != null ? review.author.displayName : review.author.username}"></span>
                        &middot;
                        <small th:text="${#temporals.format(review.publishedAt, 'MMM d, yyyy')}"></small>
                    </h6>
                    <div class="mt-3">
                        <form th:action="@{/reviews/{id}/like(id=${review.id})}" method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-outline-danger">
                                <i class="bi bi-heart-fill"></i> Like
                            </button>
                        </form>
                        <small class="ms-2">
                            <i class="bi bi-heart"></i>
                            <span th:text="${review.likeCount}">0</span></small>
                        <a class="btn btn-sm btn-outline-light ms-2"
                           th:if="${session.loggedInUser != null and session.loggedInUser.id == review.author.id}"
                           th:href="@{/reviews/{id}/edit(id=${review.id})}">Edit</a>
                        <form th:if="${session.loggedInUser != null and (session.loggedInUser.id == review.author.id or session.loggedInUser.isAdmin)}"
                              th:action="@{/reviews/{id}/delete(id=${review.id})}"
                              method="post" style="display:inline;">
                            <button type="submit" class="btn btn-sm btn-danger">Delete</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
