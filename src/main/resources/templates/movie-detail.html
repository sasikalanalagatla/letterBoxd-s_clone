<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${movie.title} + ' - Letterboxd'"></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css"
      rel="stylesheet"
    />
</head>
<body class="bg-dark text-light">
<div class="container py-4">
    <a th:href="@{/}" class="btn btn-secondary mb-3">◀ Back</a>

    <div class="row">
        <div class="col-md-4">
            <img th:src="${movie.posterUrl}" class="img-fluid" th:alt="${movie.title}" />
        </div>
        <div class="col-md-8">
            <h1 th:text="${movie.title}"></h1>
            <p class="text-muted" th:if="${movie.tagline}" th:text="${movie.tagline}"></p>
            <div class="mb-2">
                <small th:if="${movie.year}"><strong th:text="${movie.year}"></strong></small>
                <small th:if="${movie.runtime}"> • <span th:text="${movie.runtime}"></span> min</small>
            </div>
            <div class="movie-stats mb-3">
                <small class="me-3">
                    <i class="bi bi-chat-left-text"></i>
                    <span th:text="${movie.reviewCount}">0</span> reviews
                </small>
                <small class="me-3">
                    <i class="bi bi-heart"></i>
                    <span th:text="${movie.likeCount}">0</span> likes
                </small>
                <small th:if="${movie.averageLetterboxdRating != null}">
                    <i class="bi bi-star-fill"></i>
                    <span th:text="${movie.averageLetterboxdRating}">N/A</span> avg rating
                </small>
            </div>

            <div class="mb-2" th:if="${session.loggedInUser != null}">
                <form th:action="@{/movies/{id}/rate(id=${movie.id})}" method="post" class="d-flex align-items-center gap-2">
                    <label class="mb-0">Your rating:</label>
                    <div class="btn-group" role="group" aria-label="rating">
                        <button type="submit" name="rating" value="1" class="btn btn-link p-0" title="1 star">
                            <i class="bi" th:classappend="${movie.userRating != null and movie.userRating >= 1} ? ' bi-star-fill' : ' bi-star'"></i>
                        </button>
                        <button type="submit" name="rating" value="2" class="btn btn-link p-0" title="2 stars">
                            <i class="bi" th:classappend="${movie.userRating != null and movie.userRating >= 2} ? ' bi-star-fill' : ' bi-star'"></i>
                        </button>
                        <button type="submit" name="rating" value="3" class="btn btn-link p-0" title="3 stars">
                            <i class="bi" th:classappend="${movie.userRating != null and movie.userRating >= 3} ? ' bi-star-fill' : ' bi-star'"></i>
                        </button>
                        <button type="submit" name="rating" value="4" class="btn btn-link p-0" title="4 stars">
                            <i class="bi" th:classappend="${movie.userRating != null and movie.userRating >= 4} ? ' bi-star-fill' : ' bi-star'"></i>
                        </button>
                        <button type="submit" name="rating" value="5" class="btn btn-link p-0" title="5 stars">
                            <i class="bi" th:classappend="${movie.userRating != null and movie.userRating >= 5} ? ' bi-star-fill' : ' bi-star'"></i>
                        </button>
                    </div>
                </form>
            </div>

            <div class="mb-3" th:if="${session.loggedInUser != null}">
                <form th:action="@{/movies/{id}/like(id=${movie.id})}" method="post" style="display:inline;">
                    <button type="submit" class="btn btn-sm btn-outline-danger">
                        <i class="bi bi-heart-fill"></i> Like this movie
                    </button>
                </form>
            </div>
            <p th:text="${movie.overview}"></p>
        </div>
    </div>

    <!-- review form and list -->
    <div class="row mt-5">
        <div class="col-12">
            <!-- form only visible to logged-in users -->
            <div th:if="${session.loggedInUser != null}">
                <h4>Write a review</h4>

                <form id="review-form" th:object="${reviewForm}"
                      method="post"
                      th:action="@{/movies/{id}/reviews(id=${movie.id})}">
                    <!-- display validation errors if any (must be inside form) -->
                    <div class="alert alert-danger" th:if="${#fields.hasErrors('*')}">
                        <ul class="mb-0">
                            <li th:each="err : ${#fields.errors('*')}" th:text="${err}"></li>
                        </ul>
                    </div>
                    <input type="hidden" th:field="*{movieId}" />

                    <div class="mb-3">
                        <label for="body" class="form-label">Your review</label>
                        <textarea class="form-control" id="body" rows="5" th:field="*{body}" placeholder="Write your review"></textarea>
                    </div>

                    <button type="submit" class="btn btn-primary">Save</button>
                </form>
            </div>
        </div>
    </div>

    <div class="row mt-4">
        <div class="col-12">
            <!-- reviews are rendered via separate fragment -->
            <div id="reviews-container" th:insert="~{fragments/movie-reviews :: reviewList}"></div>
        </div>
    </div>
</div>

<script>
// script placed at end of body so DOM is already available; no need to wait for DOMContentLoaded
(function() {
    function loadReviews() {
        const movieId = window.location.pathname.split('/').pop();
        return fetch('/movies/' + movieId + '/reviews').then(r => r.text());
    }

    // Handle review form submission
    const reviewForm = document.getElementById('review-form');
    if (reviewForm) {
        reviewForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const formData = new FormData(this);
            fetch(this.action, { method: 'POST', body: formData })
                .then(response => {
                    if (response.redirected) {
                        window.location = response.url; // e.g. sent to login
                        throw new Error('redirected');
                    }
                    return response.text();
                })
                .then(html => {
                    console.log('review fragment response:', html);
                    const container = document.getElementById('reviews-container');
                    if (container) {
                        container.innerHTML = html;
                    }
                    reviewForm.reset();
                })
                .catch(err => console.error('Error saving review:', err));
        });
    }

    // Handle like and delete forms via event delegation (attached once only)
    const container = document.getElementById('reviews-container');
    if (container) {
        container.addEventListener('submit', function(e) {
            const form = e.target;
            const action = form.getAttribute('action') || '';
            if (action.includes('/like') || action.includes('/delete')) {
                e.preventDefault();
                fetch(action, { method: 'POST' })
                    .then(() => loadReviews().then(html => {
                        document.getElementById('reviews-container').innerHTML = html;
                    }))
                    .catch(err => console.error('Error:', err));
            }
        });
    }
})();
</script>
</body>
</html>
