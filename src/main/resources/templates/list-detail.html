<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title th:text="${list.name} + ' - Letterboxd\'s'"></title>

  <link href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --green: #00c030;
      --bg-dark: #14181c;
      --bg-card: #2c3440;
      --border: rgba(255,255,255,0.08);
      --text: #ccc;
      --text-dim: #9ab;
      --text-muted: #678;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Titillium Web", sans-serif;
      background: var(--bg-dark);
      color: var(--text);
      padding-top: 56px;
    }

    a { text-decoration: none; color: inherit; }


    /* ── LAYOUT ── */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 0 2rem;
    }

    /* ── LIST HERO ── */
    .list-hero {
      border-bottom: 1px solid var(--border);
      padding: 3rem 0 2rem;
      margin-bottom: 0;
    }

    .list-hero-inner {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 2rem;
    }

    .list-hero-title {
      font-family: "Merriweather", serif;
      font-size: 1.8rem;
      font-weight: 900;
      color: #fff;
      margin-bottom: .6rem;
    }

    .list-meta {
      font-size: .75rem;
      color: var(--text-muted);
      letter-spacing: .05em;
      margin-bottom: .8rem;
    }

    .list-meta span + span::before {
      content: ' • ';
    }

    .list-description {
      font-size: .9rem;
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 620px;
    }

    .list-hero-actions {
      display: flex;
      gap: .6rem;
      flex-shrink: 0;
      align-items: flex-start;
      padding-top: .4rem;
    }

    .btn-edit-list {
      padding: .45rem 1.2rem;
      background: var(--bg-card);
      border: 1px solid rgba(255,255,255,.2);
      border-radius: 4px;
      color: #fff;
      font-size: .78rem;
      font-weight: 600;
      font-family: "Titillium Web", sans-serif;
      cursor: pointer;
      transition: border-color .2s;
    }

    .btn-edit-list:hover { border-color: rgba(255,255,255,.5); }

    .btn-delete-list {
      padding: .45rem 1.2rem;
      background: transparent;
      border: 1px solid #c0392b;
      border-radius: 4px;
      color: #c0392b;
      font-size: .78rem;
      font-weight: 600;
      font-family: "Titillium Web", sans-serif;
      cursor: pointer;
      transition: background .2s, color .2s;
    }

    .btn-delete-list:hover { background: #c0392b; color: #fff; }

    /* ── SECTION HEADER ── */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 2rem 0 1rem;
      border-bottom: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }

    .section-label {
      font-size: .7rem;
      letter-spacing: .15em;
      text-transform: uppercase;
      color: var(--text-dim);
      font-weight: 700;
    }

    /* ── FILM ENTRIES ── */
    .film-list {
      display: flex;
      flex-direction: column;
      gap: .6rem;
      margin-bottom: 3rem;
    }

    .film-entry {
      display: flex;
      gap: 1.2rem;
      align-items: flex-start;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1rem 1.2rem;
      transition: border-color .2s;
    }

    .film-entry:hover { border-color: rgba(255,255,255,0.2); }

    .film-rank {
      font-family: "Merriweather", serif;
      font-size: 1.4rem;
      font-weight: 900;
      color: var(--text-muted);
      min-width: 2rem;
      text-align: right;
      padding-top: .2rem;
    }

    .film-poster {
      width: 72px;
      height: 108px;
      border-radius: 3px;
      overflow: hidden;
      flex-shrink: 0;
      background: var(--bg-dark);
      border: 1px solid var(--border);
    }

    .film-poster img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform .3s;
    }

    .film-entry:hover .film-poster img { transform: scale(1.05); }

    .film-details { flex: 1; }

    .film-title {
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .2rem;
    }

    .film-title a:hover { color: var(--green); }

    .film-year {
      font-size: .78rem;
      color: var(--text-muted);
      margin-bottom: .4rem;
    }

    .film-rating {
      font-size: .8rem;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: .4rem;
    }

    .film-note {
      font-size: .83rem;
      color: var(--text-dim);
      font-style: italic;
      line-height: 1.5;
      margin-top: .3rem;
    }

    .btn-remove {
      background: none;
      border: none;
      color: var(--text-muted);
      font-size: .75rem;
      font-family: "Titillium Web", sans-serif;
      cursor: pointer;
      margin-top: .6rem;
      padding: 0;
      transition: color .2s;
    }

    .btn-remove:hover { color: #e74c3c; }

    /* ── EMPTY STATE ── */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }

    .empty-state-icon {
      font-size: 2.5rem;
      margin-bottom: 1rem;
      opacity: .5;
    }

    .empty-state p {
      font-family: "Merriweather", serif;
      font-size: .95rem;
      font-weight: 700;
      margin-bottom: 1.2rem;
    }

    .btn-add-films {
      padding: .5rem 1.5rem;
      border: 1px solid rgba(255,255,255,.3);
      border-radius: 4px;
      font-size: .8rem;
      color: var(--text-dim);
      font-family: "Titillium Web", sans-serif;
      font-weight: 600;
      transition: color .2s, border-color .2s;
    }

    .btn-add-films:hover { color: #fff; border-color: #fff; }

    /* ── BACK LINK ── */
    .back-link {
      display: inline-block;
      font-size: .78rem;
      color: var(--text-muted);
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      margin: 2rem 0 3rem;
      transition: color .2s;
    }

    .back-link:hover { color: var(--green); }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .list-hero-inner { flex-direction: column; }
      .list-hero-actions { width: 100%; }
      .film-rank { display: none; }
    }
  </style>
</head>

<body>

    <div th:replace="~{fragments/layout :: navbar(activeTab='lists')}"></div>

<!-- ── MAIN ── -->
<main>
  <div class="container">

    <!-- ── LIST HERO ── -->
    <div class="list-hero">
      <div class="list-hero-inner">
        <div>
          <h1 class="list-hero-title" th:text="${list.name}">List Name</h1>
          <div class="list-meta">
            <span th:if="${list.owner != null}"
                  th:text="'by ' + ${list.owner.username}"></span>
            <span th:text="${(list.entries != null ? list.entries.size() : 0) + ' films'}"></span>
            <span th:if="${list.ranked}">Ranked</span>
            <span th:if="${list.visibility != null}" th:text="${list.visibility}"></span>
          </div>
          <p class="list-description"
             th:if="${list.description}"
             th:text="${list.description}"></p>
        </div>

        <div class="list-hero-actions"
             th:if="${session.loggedInUser != null and session.loggedInUser.username == list.owner.username}">
          <a class="btn-edit-list"
             th:href="@{/lists/{id}/edit(id=${list.id})}">Edit List</a>
          <form th:action="@{/lists/{id}/delete(id=${list.id})}"
                method="post"
                onsubmit="return confirm('Delete this list?');">
            <button type="submit" class="btn-delete-list">Delete</button>
          </form>
        </div>
      </div>
    </div>

    <!-- ── FILMS ── -->
    <div th:if="${list.entries != null and !list.entries.isEmpty()}">

      <div class="section-header">
        <span class="section-label">Films</span>
        <span class="section-label"
              th:text="${list.entries.size()} + ' total'"></span>
      </div>

      <div class="film-list">
        <div class="film-entry" th:each="entry, iter : ${list.entries}">

          <!-- rank number if ranked -->
          <div class="film-rank" th:if="${list.ranked}"
               th:text="${iter.index + 1}"></div>

          <!-- poster -->
          <div class="film-poster" th:if="${entry.posterPath != null}">
            <a th:href="@{/movies/{id}(id=${entry.movieId})}">
              <img th:src="${entry.posterPath}"
                   th:alt="${entry.movieTitle}"
                   onerror="this.src='/img/no-poster.png'" />
            </a>
          </div>

          <!-- details -->
          <div class="film-details">
            <div class="film-title">
              <a th:href="@{/movies/{id}(id=${entry.movieId})}"
                 th:text="${entry.movieTitle}"></a>
            </div>
            <div class="film-year"
                 th:if="${entry.releaseYear}"
                 th:text="${entry.releaseYear}"></div>
            <div class="film-rating" th:if="${entry.voteAverage}">
              ★ <span th:text="${#numbers.formatDecimal(entry.voteAverage, 1, 1)}"></span> / 10
            </div>
            <div class="film-note"
                 th:if="${entry.note}"
                 th:text="${entry.note}"></div>
            <form th:if="${session.loggedInUser != null and session.loggedInUser.username == list.owner.username}"
                  th:action="@{/lists/{listId}/entries/{movieId}/remove(listId=${list.id}, movieId=${entry.movieId})}"
                  method="post">
              <button type="submit" class="btn-remove">Remove from list</button>
            </form>
          </div>

        </div>
      </div>

    </div>

    <!-- ── EMPTY STATE ── -->
    <div class="empty-state"
         th:if="${list.entries == null or list.entries.isEmpty()}">
      <div class="empty-state-icon">🎬</div>
      <p>No films in this list yet.</p>
      <a class="btn-add-films"
         th:if="${session.loggedInUser != null and session.loggedInUser.username == list.owner.username}"
         th:href="@{/lists/{id}/edit(id=${list.id})}">Add Films</a>
    </div>

    <!-- ── BACK LINK ── -->
    <a class="back-link" th:href="@{/lists}">← Back to All Lists</a>

  </div>
</main>

</body>
</html>
