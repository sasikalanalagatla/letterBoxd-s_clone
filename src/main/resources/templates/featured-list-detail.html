<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${list.name} + ' - Featured List'">Featured List</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Titillium+Web:wght@300;400;600;700&family=Merriweather:wght@700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --green: #00c030;
        --green-dark: #009924;
        --bg-dark: #14181c;
        --bg-mid: #1c2228;
        --bg-card: #2c3440;
        --border: rgba(255, 255, 255, 0.08);
        --text-muted: #678;
        --text-dim: #9ab;
        --text: #ccc;
      }
      body {
        font-family: "Titillium Web", sans-serif;
        background: var(--bg-dark);
        color: var(--text);
        margin: 0;
      }
      a { color: inherit; text-decoration: none; }
      .header { position: fixed; top:0; left:0; right:0; background: rgba(20,24,28,.97); height:56px; display:flex; align-items:center; padding:0 2rem; z-index:100; }
      .logo { display:flex; align-items:center; gap:.5rem; }
      .logo-dots span { width:13px;height:13px;border-radius:50%;display:block; }
      .dot-o{background:#f97316;} .dot-g{background:#22c55e;} .dot-b{background:#3b82f6;}
      .logo-name{font-size:1.15rem;font-weight:700;color:#fff;}
      .nav-links{display:flex;align-items:center;list-style:none;gap:.1rem;flex:1;}
      .nav-links li a{font-size:.75rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:.45rem .8rem;border-radius:3px;transition:color .2s,background .2s;display:block;color:var(--text-dim);}
      .nav-links li a:hover{background:rgba(255,255,255,.05);color:#fff;}
      .nav-links li a.active{color:#fff;}
      main{margin-top:56px;padding:2rem;}
      .container{max-width:1100px;margin:0 auto;padding:0 2rem;}
      h1{font-size:2rem;font-weight:700;margin-bottom:1rem;color:#fff;}
      .subtitle{color:var(--text-dim);margin-bottom:2rem;}
      .poster-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:1rem;}
      .poster-grid img{width:100%;border-radius:4px;}
      .back-link{display:inline-flex;align-items:center;gap:.5rem;margin-bottom:1.5rem;color:var(--text-dim);font-size:.85rem;}
      .back-link:hover{color:#fff;}
      /* reviews section styling */
      .reviews-section{margin-top:2rem;}
      .movie-title{margin-top:1.5rem;color:#fff;font-size:1.2rem;}
      .review-card{background:var(--bg-card);padding:1rem;margin-bottom:1rem;border-radius:4px;}
      .review-card h5{margin-bottom:.5rem;font-size:1rem;color:#fff;}
      .review-card p{color:var(--text);}
      .review-card .likes{font-size:.9rem;color:var(--text-dim);}
      .review-actions{display:flex;align-items:center;gap:1rem;margin-top:1rem;}
      .like-btn{background:none;border:1px solid var(--green);color:var(--green);padding:0.4rem 0.8rem;border-radius:3px;cursor:pointer;font-size:0.9rem;transition:all 0.2s;}
      .like-btn:hover{background:var(--green);color:#000;font-weight:600;}
      .like-btn.liked{background:var(--green);color:#000;font-weight:600;}
      .list-header-actions{display:flex;align-items:center;gap:1rem;margin-top:1rem;}
      .list-like-btn{background:none;border:2px solid var(--green);color:var(--green);padding:0.6rem 1.2rem;border-radius:4px;cursor:pointer;font-size:1rem;font-weight:600;transition:all 0.2s;}
      .list-like-btn:hover{background:var(--green);color:#000;}
      .list-like-btn.liked{background:var(--green);color:#000;}
      .list-like-count{display:flex;align-items:center;gap:0.5rem;font-size:1rem;color:var(--text-dim);}
    </style>
  </head>
  <body>
    <header class="header">
      <a class="logo" th:href="@{/}">
        <div class="logo-dots">
          <span class="dot-o"></span>
          <span class="dot-g"></span>
          <span class="dot-b"></span>
        </div>
        <span class="logo-name">LetterBoxd's</span>
      </a>
      <ul class="nav-links">
        <li><a href="/">Home</a></li>
        <li><a href="/lists" class="active">Lists</a></li>
        <li th:if="${session.loggedInUser != null}"><a href="/profile" th:text="${session.loggedInUser.username}">Profile</a></li>
        <li th:if="${session.loggedInUser != null}"><a href="/auth/logout">Logout</a></li>
        <li th:if="${session.loggedInUser == null}"><a href="/auth/login">Sign In</a></li>
      </ul>
      <form class="search-wrap" th:action="@{/search}" method="get">
        <input type="text" name="q" placeholder="Films, people, lists..." />
        <button class="search-icon-btn" type="submit">🔍</button>
      </form>
    </header>
    <main>
      <div class="container">
        <!-- no longer a separate /lists/featured page; send users back to main lists view -->
        <a href="/lists" class="back-link">← Back to Lists</a>
        <h1 th:text="${list.name}">List Name</h1>
        <div class="featured-counts" style="display:flex;align-items:center;gap:1.5rem;margin-bottom:1rem;">
          <span class="entries" th:text="${list.entryCount} + ' movies'">0 movies</span>
          <span th:if="${loggedIn}">
            <form th:action="@{/featured/{slug}/like(slug=${featuredSlug})}" method="post" style="display:inline;">
              <button type="submit" 
                      class="list-like-btn" 
                      th:classappend="${currentUserLikedList ? 'liked' : ''}"
                      th:text="${currentUserLikedList ? '❤ liked' : '♡ like'}">like</button>
            </form>
          </span>
          <span th:if="${!loggedIn}" style="font-size:.9rem;color:var(--text-dim);">
            <a href="/auth/login">Log in</a> to like this list
          </span>
          <span class="list-like-count" th:if="${listLikeCount > 0}">
            <span th:text="${listLikeCount}">0</span>
            <span th:text="${listLikeCount == 1 ? 'like' : 'likes'}">likes</span>
          </span>
        </div>
        <p class="subtitle" th:text="${list.descriptionExcerpt}"></p>
        <div class="poster-grid" th:if="${list.previewPosterPaths != null}">
          <div th:each="path, i : ${list.previewPosterPaths}">
            <a th:href="@{/movies/{id}(id=${list.previewMovieIds[i.index]})}">
              <img th:src="${path}" th:alt="''" />
            </a>
          </div>
        </div>

        <!-- reviews for each movie in this list -->
        <div class="reviews-section" th:if="${reviewsByMovie != null and !reviewsByMovie.isEmpty()}">
          <h2>Movie Reviews</h2>
          <div th:each="entry : ${reviewsByMovie.entrySet()}">
            <h3 th:text="${movieTitles[entry.key]}" class="movie-title">Movie Name</h3>
            <div th:if="${entry.value != null and entry.value.size() > 0}">
              <div th:each="review : ${entry.value}" class="review-card">
                <h5>
                  <a th:href="@{/profile/{username}(username=${review.author.username})}" style="text-decoration: none; color: inherit;">
                    <span th:text="${review.author.displayName != null ? review.author.displayName : review.author.username}"></span>
                  </a>
                  &middot;
                  <small th:text="${#temporals.format(review.publishedAt, 'MMM d, yyyy')}"></small>
                </h5>
                <p th:text="${review.bodyExcerpt != null ? review.bodyExcerpt : review.body}"></p>
                <div class="review-actions">
                  <form th:action="@{/reviews/{id}/like(id=${review.id}, redirectTo=${'/lists/featured/' + featuredSlug})}" method="post" style="display:inline;">
                    <button type="submit" 
                            class="like-btn" 
                            th:classappend="${review.currentUserLiked == true ? 'liked' : ''}"
                            th:text="${review.currentUserLiked == true ? '❤ liked' : '♡ like'}">like</button>
                  </form>
                  <div class="like-count" th:if="${review.likeCount > 0}">
                    <span th:text="${review.likeCount}">0</span>
                    <span th:text="${review.likeCount == 1 ? 'like' : 'likes'}">likes</span>
                  </div>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </main>
  </body>
</html>
