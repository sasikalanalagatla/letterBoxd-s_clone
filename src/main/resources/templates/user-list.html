<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${listTitle} + ' - ' + profile.username + ' - Letterboxd'"></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .page-wrap { max-width: 960px; margin: 0 auto; padding-top: 2rem; }

      /* User mini header */
      .user-mini-header {
        display: flex;
        align-items: center;
        background-color: #1e252c;
        border-radius: 4px;
        padding: 0.5rem 1rem;
        margin-bottom: 2rem;
      }
      .user-mini-avatar { width: 24px; height: 24px; border-radius: 50%; object-fit: cover; margin-right: 10px; }
      .user-mini-name { color: #fff; font-weight: 700; font-size: 0.95rem; margin-right: auto; }
      .user-mini-nav { display: flex; gap: 1rem; align-items: center; }
      .user-mini-nav a { color: #89a; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.05em; font-weight: 600; text-decoration: none; transition: color 0.2s; }
      .user-mini-nav a:hover, .user-mini-nav a.active { color: #fff; }
      .user-mini-nav a.active { color: #00c030; border-bottom: 2px solid #00c030; padding-bottom: 2px; }

      /* Section header tabs */
      .list-section-header {
        display: flex;
        align-items: flex-end;
        border-bottom: 1px solid #334;
        padding-bottom: 0.5rem;
        margin-bottom: 0.5rem;
      }
      .list-tabs { display: flex; gap: 1rem; margin-right: auto; }
      .list-tab {
        color: #89a;
        font-size: 0.85rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        font-weight: 700;
        text-decoration: none;
        padding-bottom: 0.5rem;
        border-bottom: 2px solid transparent;
        margin-bottom: -0.6rem;
        transition: color 0.2s;
      }
      .list-tab:hover { color: #fff; }
      .list-tab.active { color: #00c030; border-bottom-color: #00c030; }

      /* Inline Sort */
      .inline-sort { display: flex; align-items: center; gap: 0.5rem; }
      .inline-sort label { color: #678; font-size: 0.7rem; text-transform: uppercase; margin: 0; }
      .inline-sort select {
        background: transparent;
        color: #89a;
        border: none;
        font-size: 0.7rem;
        text-transform: uppercase;
        cursor: pointer;
        outline: none;
      }
      .inline-sort select:focus { color: #fff; }

      /* Table Header */
      .table-header {
        display: grid;
        grid-template-columns: minmax(200px, 1fr) 80px 80px 80px;
        padding: 0.5rem 0;
        border-bottom: 1px solid #334;
        font-size: 0.65rem;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        color: #567;
        font-weight: 600;
      }
      .table-header > div:not(:first-child) { text-align: right; }

      /* User Row */
      .user-row {
        display: grid;
        grid-template-columns: minmax(200px, 1fr) 80px 80px 80px;
        align-items: center;
        padding: 1rem 0;
        border-bottom: 1px solid #2c3440;
        text-decoration: none;
      }
      .user-row:hover { background-color: rgba(255,255,255,0.02); }
      .user-info { display: flex; align-items: center; gap: 1rem; }
      .user-info-avatar {
        width: 40px; height: 40px; border-radius: 50%; object-fit: cover;
        background: linear-gradient(135deg, #1d232a 0%, #00c030 100%);
        display: flex; align-items: center; justify-content: center;
        font-weight: 700; color: #fff; text-transform: uppercase; font-family: "Merriweather", serif;
      }
      .user-info-text { display: flex; flex-direction: column; }
      .user-info-name { color: #fff; font-weight: 700; font-size: 0.95rem; margin-bottom: 0.1rem; }
      .user-row:hover .user-info-name { color: #00c030; }
      .user-info-meta { color: #678; font-size: 0.75rem; }

      .user-stat { text-align: right; font-size: 0.75rem; color: #89a; display: flex; align-items: center; justify-content: flex-end; gap: 0.3rem; }
      .stat-icon { color: #00c030; font-size: 0.8rem; }
      .stat-icon.watched { color: #00c030; }
      .stat-icon.lists { color: #40bcf4; }
      .stat-icon.likes { color: #f28b25; }

      .empty-state { text-align: center; padding: 3rem 1rem; color: #678; font-size: 0.9rem; }
    </style>
  </head>
  <body class="bg-dark text-light" style="padding-top: 56px;">
    <!-- ── HEADER ── -->
    <div th:replace="~{fragments/layout :: navbar(activeTab='profile')}"></div>

    <div class="page-wrap container">
      <!-- Reusable Profile Header Fragment -->
      <div th:replace="~{fragments/profile-header :: profile-header(${profile}, 'network')}"></div>

      <!-- Combined Tabs Header -->
      <div class="list-section-header" style="justify-content: flex-start; align-items: flex-end; border-bottom: 1px solid #2c3440; padding-bottom: 0;">
        <ul class="nav nav-tabs" id="networkTabs" role="tablist" style="border-bottom: none;">
          <li class="nav-item" role="presentation">
            <button class="nav-link" th:classappend="${activeTab == 'following'} ? 'active' : ''" id="following-tab" data-bs-toggle="tab" data-bs-target="#following" type="button" role="tab" style="background:transparent; border:none; color:#89a; border-bottom: 2px solid transparent; padding: 0.8rem 1.2rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; font-weight: 700;">
              Following <span th:text="${#lists.size(following)}" style="color:#678; font-weight:400; margin-left:0.3rem;"></span>
            </button>
          </li>
          <li class="nav-item" role="presentation">
            <button class="nav-link" th:classappend="${activeTab == 'followers'} ? 'active' : ''" id="followers-tab" data-bs-toggle="tab" data-bs-target="#followers" type="button" role="tab" style="background:transparent; border:none; color:#89a; border-bottom: 2px solid transparent; padding: 0.8rem 1.2rem; text-transform: uppercase; font-size: 0.85rem; letter-spacing: 0.1em; font-weight: 700;">
              Followers <span th:text="${#lists.size(followers)}" style="color:#678; font-weight:400; margin-left:0.3rem;"></span>
            </button>
          </li>
        </ul>
      </div>

      <style>
        .nav-tabs .nav-link.active {
          color: #fff !important;
          border-bottom: 2px solid #00c030 !important;
        }
        .nav-tabs .nav-link:hover {
          color: #fff !important;
        }
        .tab-pane-header {
          display: flex;
          justify-content: flex-end;
          padding: 1rem 0 0.5rem;
        }
      </style>

      <div class="tab-content" id="networkTabContent">
        <!-- FOLLOWING TAB -->
        <div class="tab-pane fade" th:classappend="${activeTab == 'following'} ? 'show active' : ''" id="following" role="tabpanel" aria-labelledby="following-tab">
          <div class="tab-pane-header">
            <form th:action="@{${basePath}}" method="get" class="inline-sort" th:if="${!following.isEmpty()}">
              <input type="hidden" name="sortFollowers" th:value="${sortFollowers}" />
              <input type="hidden" name="tab" value="following" />
              <label for="sortFollowing" style="color:#567; font-size: 0.75rem; text-transform: uppercase;">Sort by</label>
              <select id="sortFollowing" name="sortFollowing" onchange="this.form.submit()" style="background:none; border:none; color:#9ab; font-size:0.85rem; cursor:pointer;">
                <option value="joined_desc" th:selected="${sortFollowing == 'joined_desc'}">When Followed</option>
                <option value="joined_asc" th:selected="${sortFollowing == 'joined_asc'}">Oldest First</option>
                <option value="username_az" th:selected="${sortFollowing == 'username_az'}">Username A-Z</option>
                <option value="username_za" th:selected="${sortFollowing == 'username_za'}">Username Z-A</option>
              </select>
            </form>
          </div>
          
          <div class="table-header" th:if="${!following.isEmpty()}">
            <div>Name</div>
            <div>Watched</div>
            <div>Lists</div>
            <div>Likes</div>
          </div>
          <div th:if="${!following.isEmpty()}">
            <a th:href="@{/profile/{username}(username=${usr.username})}" class="user-row" th:each="usr : ${following}">
              <div class="user-info">
                <img class="user-info-avatar" th:if="${usr.avatarUrl}" th:src="${usr.avatarUrl}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                <div class="user-info-avatar"
                     th:style="${usr.avatarUrl != null} ? 'display:none' : 'display:flex'">
                  <span th:text="${usr.username.substring(0,1).toUpperCase()}"></span>
                </div>
                <div class="user-info-text">
                  <span class="user-info-name" th:text="${usr.username}"></span>
                  <span class="user-info-meta">
                    <span th:text="${usr.followersCount != null ? usr.followersCount : 0}"></span> follower<span th:text="${usr.followersCount != 1 ? 's' : ''}"></span>, 
                    following <span th:text="${usr.followingCount != null ? usr.followingCount : 0}"></span>
                  </span>
                </div>
              </div>
              <div class="user-stat">
                <i class="bi bi-eye-fill stat-icon watched"></i>
                <span th:text="${usr.filmsWatchedCount != null ? usr.filmsWatchedCount : 0}"></span>
              </div>
              <div class="user-stat">
                <i class="bi bi-grid-fill stat-icon lists"></i>
                <span th:text="${usr.listCount != null ? usr.listCount : 0}"></span>
              </div>
              <div class="user-stat">
                <i class="bi bi-heart-fill stat-icon likes"></i>
                <span th:text="${usr.likeCount != null ? usr.likeCount : 0}"></span>
              </div>
            </a>
          </div>
          <div class="empty-state" th:if="${following.isEmpty()}" style="padding: 4rem 1rem;">
            <p th:text="${profile.username} + ' is not following anyone yet.'"></p>
          </div>
        </div>

        <!-- FOLLOWERS TAB -->
        <div class="tab-pane fade" th:classappend="${activeTab == 'followers'} ? 'show active' : ''" id="followers" role="tabpanel" aria-labelledby="followers-tab">
          <div class="tab-pane-header">
            <form th:action="@{${basePath}}" method="get" class="inline-sort" th:if="${!followers.isEmpty()}">
              <input type="hidden" name="sortFollowing" th:value="${sortFollowing}" />
              <input type="hidden" name="tab" value="followers" />
              <label for="sortFollowers" style="color:#567; font-size: 0.75rem; text-transform: uppercase;">Sort by</label>
              <select id="sortFollowers" name="sortFollowers" onchange="this.form.submit()" style="background:none; border:none; color:#9ab; font-size:0.85rem; cursor:pointer;">
                <option value="joined_desc" th:selected="${sortFollowers == 'joined_desc'}">When Followed</option>
                <option value="joined_asc" th:selected="${sortFollowers == 'joined_asc'}">Oldest First</option>
                <option value="username_az" th:selected="${sortFollowers == 'username_az'}">Username A-Z</option>
                <option value="username_za" th:selected="${sortFollowers == 'username_za'}">Username Z-A</option>
              </select>
            </form>
          </div>

          <div class="table-header" th:if="${!followers.isEmpty()}">
            <div>Name</div>
            <div>Watched</div>
            <div>Lists</div>
            <div>Likes</div>
          </div>
          <div th:if="${!followers.isEmpty()}">
            <a th:href="@{/profile/{username}(username=${usr.username})}" class="user-row" th:each="usr : ${followers}">
              <div class="user-info">
                <img class="user-info-avatar" th:if="${usr.avatarUrl}" th:src="${usr.avatarUrl}"
                     onerror="this.style.display='none';this.nextElementSibling.style.display='flex'"/>
                <div class="user-info-avatar"
                     th:style="${usr.avatarUrl != null} ? 'display:none' : 'display:flex'">
                  <span th:text="${usr.username.substring(0,1).toUpperCase()}"></span>
                </div>
                <div class="user-info-text">
                  <span class="user-info-name" th:text="${usr.username}"></span>
                  <span class="user-info-meta">
                    <span th:text="${usr.followersCount != null ? usr.followersCount : 0}"></span> follower<span th:text="${usr.followersCount != 1 ? 's' : ''}"></span>, 
                    following <span th:text="${usr.followingCount != null ? usr.followingCount : 0}"></span>
                  </span>
                </div>
              </div>
              <div class="user-stat">
                <i class="bi bi-eye-fill stat-icon watched"></i>
                <span th:text="${usr.filmsWatchedCount != null ? usr.filmsWatchedCount : 0}"></span>
              </div>
              <div class="user-stat">
                <i class="bi bi-grid-fill stat-icon lists"></i>
                <span th:text="${usr.listCount != null ? usr.listCount : 0}"></span>
              </div>
              <div class="user-stat">
                <i class="bi bi-heart-fill stat-icon likes"></i>
                <span th:text="${usr.likeCount != null ? usr.likeCount : 0}"></span>
              </div>
            </a>
          </div>
          <div class="empty-state" th:if="${followers.isEmpty()}" style="padding: 4rem 1rem;">
            <p th:text="${profile.username} + ' has no followers yet.'"></p>
          </div>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
