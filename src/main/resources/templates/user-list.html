<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title th:text="${listTitle} + ' - ' + ${profile.username} + ' - Letterboxd'"></title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      .page-header {
        background: linear-gradient(135deg, #1a1a1a 0%, #2a2a2a 100%);
        padding: 2rem 0;
        border-bottom: 2px solid #333;
        margin-bottom: 2rem;
      }
      .section-title {
        font-size: 1.8rem;
        font-weight: 700;
        margin-top: 2rem;
        margin-bottom: 2rem;
        border-bottom: 2px solid #333;
        padding-bottom: 1rem;
      }
      .user-card {
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 1.5rem;
        transition:
          transform 0.3s,
          border-color 0.3s;
        cursor: pointer;
        height: 100%;
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .user-card:hover {
        transform: translateY(-5px);
        border-color: #556b2f;
        background: #222;
      }
      .avatar {
        width: 50px;
        height: 50px;
        border-radius: 50%;
        object-fit: cover;
      }
      .username {
        font-size: 1.2rem;
        font-weight: 700;
        color: #fff;
      }
      .back-link {
        color: #556b2f;
        text-decoration: none;
        margin-bottom: 1rem;
        display: inline-block;
      }
      .back-link:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body class="bg-dark text-light">
    <nav class="navbar navbar-expand-lg navbar-dark bg-darker mb-5">
      <div class="container-fluid">
        <a class="navbar-brand" th:href="@{/}" style="font-weight: 700; font-size: 1.5rem">
          Letterboxd
        </a>
        <div class="collapse navbar-collapse" id="navbarNav">
          <form class="d-flex ms-3 me-auto" th:action="@{/search}" method="get">
            <div class="input-group input-group-sm">
              <input type="text" name="q" class="form-control nav-search-input"
                     placeholder="Search films, people, lists…" />
              <button class="btn nav-search-btn" type="submit"><i class="bi bi-search"></i></button>
            </div>
          </form>
          <ul class="navbar-nav">
            <li class="nav-item me-1">
              <a class="nav-link" th:href="@{/members}">Members</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser != null}">
              <a class="nav-link" th:href="@{/profile}">My Profile</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser != null}">
              <a class="nav-link" th:href="@{/lists}">All Lists</a>
            </li>
            <li class="nav-item" th:if="${session.loggedInUser != null}">
              <a class="nav-link" th:href="@{/auth/logout}">Logout</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>

    <style>
      .bg-darker { background-color: #1a1a1a !important; border-bottom: 1px solid #333; }
      .navbar-brand:hover { color: #556b2f !important; }
      .nav-search-input { background-color: #2c3440 !important; color: #c8d0d8 !important; border-color: #456 !important; min-width: 200px; }
      .nav-search-input::placeholder { color: #667 !important; }
      .nav-search-input:focus { box-shadow: 0 0 0 2px rgba(0,192,48,.25) !important; border-color: #00c030 !important; }
      .nav-search-btn { border-color: #456 !important; color: #c8d0d8 !important; }
      .nav-search-btn:hover { background-color: #00c030 !important; border-color: #00c030 !important; color: #fff !important; }
    </style>

    <div class="container">
      <a th:href="@{/profile/{username}(username=${profile.username})}" class="back-link">← Back to Profile</a>

      <div class="page-header">
        <h1 th:text="${listTitle} + (profile != null ? ' of ' + profile.username : '')"></h1>
        <p style="color: #999; margin-bottom: 0">
          <span th:text="${#lists.size(users)}"></span>
          <span th:text="${#lists.size(users) == 1 ? 'user' : 'users'}"></span>
        </p>
      </div>

      <div class="row g-4" th:if="${!users.isEmpty()}">
        <div class="col-md-6 col-lg-4" th:each="usr : ${users}">
          <a th:href="@{/profile/{username}(username=${usr.username})}" style="text-decoration: none">
            <div class="user-card">
              <img class="avatar" th:if="${usr.avatarUrl}" th:src="${usr.avatarUrl}" />
              <div class="username" th:text="${usr.username}"></div>
            </div>
          </a>
        </div>
      </div>

      <div class="empty-state" th:if="${users.isEmpty()}">
        <div class="empty-state-icon">👤</div>
        <p th:text="${listTitle} + ' list is empty.'"></p>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
