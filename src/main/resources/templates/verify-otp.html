<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Verify OTP - Letterboxd Clone</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        display: flex;
        align-items: center;
        justify-content: center;
        min-height: 100vh;
        background: linear-gradient(135deg, #1a1a1a 0%, #2d2d2d 100%);
      }
      .container {
        width: 100%;
        max-width: 400px;
        padding: 2rem;
      }
      .card {
        border: none;
        border-radius: 10px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
      }
      .btn-primary {
        background-color: #556b2f;
        border: none;
        padding: 0.7rem;
        font-weight: 600;
      }
      .btn-primary:hover {
        background-color: #6b8e23;
        color: white;
      }
      .form-control {
        border-radius: 5px;
        padding: 0.75rem 1rem;
        border: 1px solid #ddd;
        text-align: center;
        font-size: 1.5rem;
        letter-spacing: 5px;
      }
      .form-control:focus {
        border-color: #556b2f;
        box-shadow: 0 0 5px rgba(85, 107, 47, 0.3);
      }
      .auth-subtitle {
        color: #666;
        text-align: center;
        margin-bottom: 1.5rem;
        font-size: 0.9rem;
      }
    </style>
  </head>
  <body class="bg-dark">
    <div class="container">
      <div class="card bg-light">
        <div class="card-body p-4">
          <h4 class="card-title mb-2 text-center">Verify OTP</h4>
          <p class="auth-subtitle">Enter the 6-digit code sent to your email.</p>

          <div th:if="${error}" class="alert alert-danger text-center" th:text="${error}"></div>

          <form th:action="@{/auth/verify-otp}" method="post">
            <input type="hidden" name="email" th:value="${email}" />
            
            <div class="mb-4">
              <input type="text" id="otp" name="otp" 
                     placeholder="000000" required 
                     class="form-control" autocomplete="one-time-code"
                     maxlength="6" pattern="\d{6}">
            </div>

            <button type="submit" class="btn btn-primary w-100 text-white">Verify Code</button>
          </form>

          <div class="text-center mt-3">
            <p class="small text-muted">Didn't receive the code? <a th:href="@{/auth/forgot}" class="text-decoration-none" style="color: #556b2f; font-weight: 600;">Try again</a></p>
          </div>
        </div>
      </div>

      <div style="text-align: center; margin-top: 2rem">
        <a th:href="@{/auth/login}" style="color: #999; text-decoration: none">
          Back to Login
        </a>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
